name: Build AgentLink APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag. Defaults to next 0.0.x tag."
        required: false
        type: string
      release_name:
        description: "Release title. Defaults to AgentLink <tag>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Prepare APK release
        id: release
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          tag_name="$RELEASE_TAG_INPUT"
          if [ -z "$tag_name" ]; then
            latest_patch="$(git tag --list '0.0.*' | sed -E 's/^0\.0\.([0-9]+)$/\1/' | sort -n | tail -1)"
            if [ -z "$latest_patch" ]; then
              latest_patch=0
            fi
            next_patch=$((latest_patch + 1))
            tag_name="0.0.${next_patch}"
          fi

          if ! echo "$tag_name" | grep -Eq '^0\.0\.[0-9]+$'; then
            echo "release_tag must match 0.0.x, got: $tag_name"
            exit 1
          fi
          version_code="${tag_name##*.}"

          release_name="$RELEASE_NAME_INPUT"
          if [ -z "$release_name" ]; then
            release_name="AgentLink ${tag_name}"
          fi

          apk_path="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$apk_path"
          cp "$apk_path" agentlink-debug.apk

          {
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
            echo "version_code=$version_code"
            echo "apk_path=agentlink-${tag_name}.apk"
          } >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.AGENTLINK_RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.AGENTLINK_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.AGENTLINK_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.AGENTLINK_RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || { echo "Missing AGENTLINK_RELEASE_KEYSTORE_BASE64"; exit 1; }
          test -n "$KEYSTORE_PASSWORD" || { echo "Missing AGENTLINK_RELEASE_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$KEY_ALIAS" || { echo "Missing AGENTLINK_RELEASE_KEY_ALIAS"; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "Missing AGENTLINK_RELEASE_KEY_PASSWORD"; exit 1; }

      - name: Decode release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.AGENTLINK_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/agentlink-signing"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/agentlink-signing/release.jks"

      - name: Build signed release APK
        env:
          AGENTLINK_KEYSTORE_PATH: ${{ runner.temp }}/agentlink-signing/release.jks
          AGENTLINK_KEYSTORE_PASSWORD: ${{ secrets.AGENTLINK_RELEASE_KEYSTORE_PASSWORD }}
          AGENTLINK_KEY_ALIAS: ${{ secrets.AGENTLINK_RELEASE_KEY_ALIAS }}
          AGENTLINK_KEY_PASSWORD: ${{ secrets.AGENTLINK_RELEASE_KEY_PASSWORD }}
        run: |
          gradle :app:assembleRelease \
            -PVERSION_NAME="${{ steps.release.outputs.tag_name }}" \
            -PVERSION_CODE="${{ steps.release.outputs.version_code }}"

      - name: Copy release APK
        run: |
          apk_path="app/build/outputs/apk/release/app-release.apk"
          test -f "$apk_path"
          cp "$apk_path" "${{ steps.release.outputs.apk_path }}"

      - name: Create GitHub release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag_name }}" \
            "${{ steps.release.outputs.apk_path }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release.outputs.release_name }}" \
            --notes "Signed APK built from $GITHUB_SHA by workflow run $GITHUB_RUN_ID." \
            --prerelease
