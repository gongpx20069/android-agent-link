name: Build AgentLink APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag. Defaults to debug-apk-<run_number>-<run_attempt>."
        required: false
        type: string
      release_name:
        description: "Release title. Defaults to the generated debug APK release name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and release debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Prepare APK release
        id: release
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          tag_name="$RELEASE_TAG_INPUT"
          if [ -z "$tag_name" ]; then
            tag_name="debug-apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          fi

          release_name="$RELEASE_NAME_INPUT"
          if [ -z "$release_name" ]; then
            release_name="AgentLink debug APK ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          fi

          apk_path="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$apk_path"
          cp "$apk_path" agentlink-debug.apk

          {
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
            echo "apk_path=agentlink-debug.apk"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag_name }}" \
            "${{ steps.release.outputs.apk_path }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release.outputs.release_name }}" \
            --notes "Debug APK built from $GITHUB_SHA by workflow run $GITHUB_RUN_ID." \
            --prerelease
