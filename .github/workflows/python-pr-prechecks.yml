name: Python PR prechecks

on:
  pull_request:
    paths:
      - "bridge/**"
      - ".github/workflows/python-pr-prechecks.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "bridge/**"
      - ".github/workflows/python-pr-prechecks.yml"

jobs:
  bridge-python:
    name: Bridge Python tests and syntax
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: PYTHONPATH="$PWD/bridge/src" python -m unittest discover -s bridge/tests -v

      - name: Check Python syntax
        run: python -m compileall -q bridge/src bridge/tests

      - name: Run CLI smoke test
        run: PYTHONPATH="$PWD/bridge/src" python -m android_acp_bridge.main pairing --endpoint ws://127.0.0.1:4317 --no-qr
